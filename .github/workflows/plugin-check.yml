name: WordPress Plugin Checks

on:
  push:
    branches:
      - develop
      - trunk
  pull_request:
    branches:
      - develop

jobs:
  build:
    uses: WordPress/ai/.github/workflows/build-plugin-zip.yml@trunk

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Download built zip
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ github.event.repository.name }}
          path: ${{ github.event.repository.name }}

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: ${{ github.event.repository.name }}

      - name: Run plugin check
        uses: wordpress/plugin-check-action@ec9b3fe9beaa76bcc4510b7ba2cb5855a5f80f3f # v1.1.4
        with:
          build-dir: ${{ github.event.repository.name }}
          exclude-directories: 'assets,dist,vendor'
          ignore-warnings: true
