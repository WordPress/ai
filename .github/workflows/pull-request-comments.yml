name: Pull Request Comments

on:
  pull_request_target:
    types: [ 'opened', 'synchronize', 'reopened', 'edited' ]

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name for pull requests
  # or the commit hash for any other events.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request_target' && github.head_ref || github.sha }}

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:

  # Builds the plugin ZIP file.
  build-plugin-zip:
    name: Build plugin zip
    uses: dkotter/ai/.github/workflows/build-plugin-zip.yml@dev/wordpress-playground-workflow #./.github/workflows/build-plugin-zip.yml
    permissions:
      contents: read

  # Leaves a comment on a pull request with a link to test the changes in a WordPress Playground instance.
  playground-details:
    name: Comment on a pull request with Playground details
    runs-on: ubuntu-24.04
    needs: build-plugin-zip
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: ${{ github.event.repository.name }}
          path: ${{ github.event.repository.name }}

      - name: Check if comment already exists
        id: check-pr-contents
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            // Get the pull request details.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // Define the string to search for.
            const searchString = 'Test using WordPress Playground';

            let foundString = false;

            // Check PR body.
            if (pr.body.includes(searchString)) {
              foundString = true;
            }

            // Set outputs.
            core.setOutput('string_found', foundString);

            console.log(`Search string "${searchString}" found: ${foundString}`);

      - name: Update PR body with a comment about testing with Playground
        if: steps.check-pr-contents.outputs.string_found == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const blueprint = {
              preferredVersions: {
                php: '7.4',
                wp: 'latest',
              },
              steps: [
                {
                  step: 'mkdir',
                  path: '/tmp/pr',
                },
                {
                  step: 'writeFile',
                  path: '/tmp/pr/pr.zip',
                  data: {
                    resource: 'url',
                    url: `/plugin-proxy.php?org=WordPress&repo=ai&workflow=Build%20Plugin%20Zip&artifact=ai&pr=${prNumber}`,
                    caption: `Downloading AI Experiments PR ${prNumber}`,
                  },
                },
                {
                  step: 'unzip',
                  zipPath: '/tmp/pr/pr.zip',
                  extractToPath: '/tmp/pr',
                },
                {
                  step: 'installPlugin',
                  pluginData: {
                    resource: 'vfs',
                    path: '/tmp/pr/ai.zip',
                  },
                }
              ]
            };
            const blueprintUrl = `https://playground.wordpress.net/#${encodeURI(JSON.stringify(blueprint))}`;

            // Get the current PR details.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Create the comment to append.
            const playgroundComment = `## Test using WordPress Playground
            The changes in this pull request can be previewed and tested using a [WordPress Playground](https://wordpress.github.io/wordpress-playground/) instance.

            [WordPress Playground](https://wordpress.github.io/wordpress-playground/) is an experimental project that creates a full WordPress instance entirely within the browser.

            ### Some things to be aware of
            - The Plugin and Theme Directories cannot be accessed within Playground.
            - All changes will be lost when closing a tab with a Playground instance.
            - All changes will be lost when refreshing the page.
            - A fresh instance is created each time the link below is clicked.
            - Every time this pull request is updated, a new ZIP file containing all changes is created. If changes are not reflected in the Playground instance, it's possible that the most recent build failed, or has not completed.

            For more details about these limitations and more, check out the [Limitations page](https://wordpress.github.io/wordpress-playground/developers/limitations/) in the WordPress Playground documentation.

            [Test this pull request with WordPress Playground](${blueprintUrl}).`;

            // Append the comment to the existing PR body.
            const updatedBody = pr.body + playgroundComment;

            // Update the PR body.
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: updatedBody
            });

            console.log('Successfully updated PR body with Playground comment');
